name: Pages (images)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public/images
          cp -R stream_images/* public/images/
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>aoe2civgen — images</title>
              <style>
                body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
                code { background: #f2f2f2; padding: 2px 6px; border-radius: 6px; }
              </style>
            </head>
            <body>
              <h1>aoe2civgen — images</h1>
              <p>Static image hosting (GitHub Pages). Files live under <code>/images/&lt;locale&gt;/&lt;filename&gt;.png</code>.</p>
              <ul>
                <li><a href="images/en/Aztecs.png">Example EN: /images/en/Aztecs.png</a></li>
                <li><a href="images/ru/%D0%90%D1%86%D1%82%D0%B5%D0%BA%D0%B8.png">Example RU: /images/ru/%D0%90%D1%86%D1%82%D0%B5%D0%BA%D0%B8.png</a></li>
              </ul>
              <p>Note: non-ASCII filenames must be percent-encoded in URLs (browsers usually do this automatically).</p>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
